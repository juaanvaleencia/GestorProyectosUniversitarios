# OIDC compartido — Firebase Authentication como IdP (JWT Bearer, sin introspection)
firebase.project-id=gestionproyectosuniversitarios

quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=https://securetoken.google.com/${firebase.project-id}
quarkus.oidc.client-id=${firebase.project-id}
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=https://securetoken.google.com/${firebase.project-id}
quarkus.oidc.token.audience=${firebase.project-id}
quarkus.oidc.authentication.user-info-required=false

quarkus.http.auth.permission.health.paths=/api/health,/q/health
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated
